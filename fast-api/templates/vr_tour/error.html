<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Error — Foodies Pakistan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #f0f0f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        .container { text-align: center; max-width: 380px; }
        .icon { font-size: 56px; margin-bottom: 20px; }
        h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
        p { color: rgba(255,255,255,0.5); font-size: 14px; line-height: 1.6; }
        .btn {
            display: inline-block; margin-top: 28px;
            padding: 14px 32px;
            background: linear-gradient(135deg, #ff6b35, #e85d2a);
            color: white; border-radius: 12px; text-decoration: none;
            font-size: 15px; font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⚠️</div>
        <h1>{{ title }}</h1>
        <p>{{ message }}</p>
        <a href="javascript:history.back()" class="btn">← Go Back</a>
    </div>
</body>
</html>
