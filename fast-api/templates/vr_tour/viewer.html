<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <title>360° Virtual Tour — {{ restaurant_name }} | Foodies Pakistan</title>

    <!-- Photo Sphere Viewer (core + plugins) — professional 360 viewer -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.14.3/index.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin@5.14.3/index.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/compass-plugin@5.14.3/index.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/virtual-tour-plugin@5.14.3/index.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --fp-orange: #ff6b35; --fp-dark: #0a0a0f; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: var(--fp-dark); font-family: 'Inter', sans-serif; }

        #panorama-viewer { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }

        /* Branding bar */
        .brand-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 18px; padding-top: max(12px, env(safe-area-inset-top));
            background: linear-gradient(to bottom, rgba(0,0,0,0.65), transparent);
            pointer-events: none;
        }
        .brand-bar > * { pointer-events: auto; }
        .brand-info { display: flex; flex-direction: column; }
        .brand-label { font-size: 10px; font-weight: 700; color: var(--fp-orange); text-transform: uppercase; letter-spacing: 1.6px; }
        .brand-name { font-size: 16px; font-weight: 700; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,.5); }
        .close-btn {
            width: 38px; height: 38px; border-radius: 50%;
            background: rgba(255,255,255,0.12); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.18); color: #fff; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .2s;
        }
        .close-btn:hover { background: rgba(255,255,255,0.25); }

        /* Scene selector (bottom thumbnails) */
        .scene-selector {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
            display: flex; gap: 8px; padding: 10px 14px;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
            overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        .scene-selector::-webkit-scrollbar { display: none; }
        .scene-card { flex-shrink: 0; width: 84px; cursor: pointer; text-align: center; }
        .scene-card img {
            width: 84px; height: 52px; border-radius: 8px; object-fit: cover;
            border: 2px solid transparent; transition: border .2s, box-shadow .2s; background:#222;
        }
        .scene-card.active img { border-color: var(--fp-orange); box-shadow: 0 0 12px rgba(255,107,53,.45); }
        .scene-card span {
            display: block; font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .scene-card.active span { color: var(--fp-orange); }

        /* Loading */
        .loading-overlay {
            position: fixed; inset: 0; display: flex; flex-direction: column; gap: 14px;
            align-items: center; justify-content: center; background: var(--fp-dark);
            z-index: 200; transition: opacity .5s;
        }
        .loading-overlay.fade-out { opacity: 0; pointer-events: none; }
        .loading-spinner { width: 46px; height: 46px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--fp-orange); border-radius: 50%; animation: spin .8s linear infinite; }
        .loading-text { color: rgba(255,255,255,.6); font-size: 12px; font-weight: 600; letter-spacing: .5px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Info marker bubble */
        .psv-info-marker {
            background: rgba(10,10,15,.9); color: #fff; border: 1px solid var(--fp-orange);
            padding: 8px 12px; border-radius: 10px; font-size: 12px; font-weight: 600;
            max-width: 220px; backdrop-filter: blur(8px); box-shadow: 0 6px 20px rgba(0,0,0,.4);
        }
        /* Keep the PSV navbar above our bottom selector */
        .psv-navbar { z-index: 110 !important; bottom: 76px !important; }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading 360° tour…</div>
    </div>

    <div class="brand-bar">
        <div class="brand-info">
            <span class="brand-label">360° Virtual Tour</span>
            <span class="brand-name">{{ restaurant_name }}</span>
        </div>
        <button class="close-btn" id="close-btn" title="Close Tour">✕</button>
    </div>

    <div id="panorama-viewer"></div>
    <div class="scene-selector" id="scene-selector"></div>

    <script id="tour-data" type="application/json">
        {{ tour_data | safe }}
    </script>

    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
        "@photo-sphere-viewer/core": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.14.3/index.module.js",
        "@photo-sphere-viewer/markers-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin@5.14.3/index.module.js",
        "@photo-sphere-viewer/compass-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/compass-plugin@5.14.3/index.module.js",
        "@photo-sphere-viewer/autorotate-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/autorotate-plugin@5.14.3/index.module.js",
        "@photo-sphere-viewer/gyroscope-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/gyroscope-plugin@5.14.3/index.module.js",
        "@photo-sphere-viewer/virtual-tour-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/virtual-tour-plugin@5.14.3/index.module.js"
      }
    }
    </script>

    <script type="module">
        import { Viewer } from '@photo-sphere-viewer/core';
        import { MarkersPlugin } from '@photo-sphere-viewer/markers-plugin';
        import { CompassPlugin } from '@photo-sphere-viewer/compass-plugin';
        import { AutorotatePlugin } from '@photo-sphere-viewer/autorotate-plugin';
        import { GyroscopePlugin } from '@photo-sphere-viewer/gyroscope-plugin';
        import { VirtualTourPlugin } from '@photo-sphere-viewer/virtual-tour-plugin';

        const tourData = JSON.parse(document.getElementById('tour-data').textContent);
        const scenes = Array.isArray(tourData.scenes) ? tourData.scenes : [];
        const startNodeId = tourData.defaultSceneId || (scenes[0] && scenes[0].id);

        const deg = (v) => `${Number(v) || 0}deg`;
        const esc = (s) => String(s || '').replace(/[&<>"']/g, c => (
            { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
        ));

        // ── Build Virtual-Tour nodes (room-to-room) ──
        const nodes = scenes.map((scene, i) => {
            const links = [];
            const sceneHs = (scene.hotspots || []).filter(h => h.type === 'scene' && h.targetSceneId);
            if (sceneHs.length) {
                sceneHs.forEach(h => links.push({
                    nodeId: h.targetSceneId,
                    position: { yaw: deg(h.yaw), pitch: deg(h.pitch) },
                    name: h.text || 'Go',
                }));
            } else if (scenes.length > 1) {
                // Auto-link next / previous when no hotspots were authored.
                if (i < scenes.length - 1) links.push({ nodeId: scenes[i + 1].id, position: { yaw: deg(90), pitch: deg(0) }, name: scenes[i + 1].name || 'Next' });
                if (i > 0) links.push({ nodeId: scenes[i - 1].id, position: { yaw: deg(-90), pitch: deg(0) }, name: scenes[i - 1].name || 'Back' });
            }
            const markers = (scene.hotspots || []).filter(h => h.type === 'info').map((h, idx) => ({
                id: `m-${scene.id}-${idx}`,
                position: { yaw: deg(h.yaw), pitch: deg(h.pitch) },
                html: `<div class="psv-info-marker">${esc(h.text)}</div>`,
                anchor: 'bottom center',
                tooltip: h.text ? { content: esc(h.text) } : undefined,
            }));
            return {
                id: scene.id,
                panorama: scene.panoramaUrl,
                thumbnail: scene.thumbnailUrl,
                name: scene.name,
                caption: scene.name,
                links,
                markers,
            };
        });

        const startScene = scenes.find(s => s.id === startNodeId) || scenes[0];
        const iv = (startScene && startScene.initialView) || {};

        const viewer = new Viewer({
            container: 'panorama-viewer',
            caption: '{{ restaurant_name }}',
            loadingImg: null,
            defaultYaw: deg(iv.yaw || 0),
            defaultPitch: deg(iv.pitch || 0),
            defaultZoomLvl: 35,
            minFov: 30,
            maxFov: 100,
            mousewheelCtrlKey: false,
            touchmoveTwoFingers: false,
            navbar: ['zoom', 'move', 'gyroscope', 'autorotate', 'caption', 'fullscreen'],
            plugins: [
                MarkersPlugin,
                [AutorotatePlugin, { autostartDelay: 3500, autorotateSpeed: '0.4rpm', autorotatePitch: '2deg' }],
                GyroscopePlugin,
                [CompassPlugin, { size: '84px', position: 'top right' }],
                [VirtualTourPlugin, {
                    positionMode: 'manual',
                    renderMode: '3d',          // immersive on-floor link arrows
                    nodes,
                    startNodeId,
                    transitionOptions: { showLoader: true, speed: '12rpm', fadeIn: true, rotation: true },
                }],
            ],
        });

        const virtualTour = viewer.getPlugin(VirtualTourPlugin);

        // ── Bottom scene selector ──
        const selector = document.getElementById('scene-selector');
        function buildSelector() {
            if (scenes.length <= 1) { selector.style.display = 'none'; return; }
            selector.innerHTML = '';
            scenes.forEach(scene => {
                const card = document.createElement('div');
                card.className = `scene-card ${scene.id === startNodeId ? 'active' : ''}`;
                card.dataset.id = scene.id;
                card.innerHTML = `<img src="${scene.thumbnailUrl}" alt="${esc(scene.name)}" loading="lazy"><span>${esc(scene.name)}</span>`;
                card.onclick = () => virtualTour.setCurrentNode(scene.id);
                selector.appendChild(card);
            });
        }
        function markActive(id) {
            selector.querySelectorAll('.scene-card').forEach(c =>
                c.classList.toggle('active', c.dataset.id === id));
        }
        buildSelector();

        virtualTour.addEventListener('node-changed', ({ node }) => markActive(node.id));

        viewer.addEventListener('ready', () => {
            const loading = document.getElementById('loading');
            loading.classList.add('fade-out');
            setTimeout(() => (loading.style.display = 'none'), 500);
        }, { once: true });

        // ── Close (iframe-aware) ──
        document.getElementById('close-btn').onclick = () => {
            if (window.parent !== window) window.parent.postMessage({ type: 'CLOSE_VR_TOUR' }, '*');
            else window.history.back();
        };
    </script>
</body>
</html>
