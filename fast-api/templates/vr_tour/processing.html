<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Processing — Foodies Pakistan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --fp-orange: #ff6b35;
            --fp-dark: #0a0a0f;
            --fp-text: #f0f0f5;
            --fp-text-dim: rgba(255,255,255,0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--fp-dark);
            color: var(--fp-text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        .container { text-align: center; max-width: 400px; }
        .spinner-wrapper {
            width: 100px; height: 100px;
            margin: 0 auto 28px;
            position: relative;
        }
        .spinner-ring {
            position: absolute; inset: 0;
            border: 3px solid rgba(255,255,255,0.06);
            border-top-color: var(--fp-orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .spinner-ring:nth-child(2) {
            inset: 10px;
            border-top-color: rgba(255,107,53,0.5);
            animation-duration: 1.5s;
            animation-direction: reverse;
        }
        .spinner-ring:nth-child(3) {
            inset: 20px;
            border-top-color: rgba(255,107,53,0.3);
            animation-duration: 2s;
        }
        .spinner-icon {
            position: absolute; inset: 30px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
        .scene-name { color: var(--fp-orange); font-size: 14px; font-weight: 600; margin-bottom: 20px; }
        #status-text { color: var(--fp-text-dim); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
        .steps { text-align: left; }
        .step {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; margin-bottom: 8px;
            background: rgba(255,255,255,0.04);
            border-radius: 10px; font-size: 13px;
        }
        .step-icon { font-size: 18px; width: 24px; text-align: center; }
        .step.active { border: 1px solid rgba(255,107,53,0.3); }
        .step.done .step-icon::after { content: "✅"; }
        .step.active .step-icon::after { content: "⏳"; animation: pulse 1.5s infinite; }
        .step.pending .step-icon::after { content: "⬜"; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        .error-box {
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
            border-radius: 12px; padding: 16px; margin-top: 20px; display: none;
        }
        .error-box p { color: #fca5a5; font-size: 13px; }
        .btn-primary {
            display: inline-block; margin-top: 20px; padding: 14px 32px;
            background: linear-gradient(135deg, var(--fp-orange), #e85d2a);
            color: white; border: none; border-radius: 12px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner-wrapper" id="spinner">
            <div class="spinner-ring"></div>
            <div class="spinner-ring"></div>
            <div class="spinner-ring"></div>
            <div class="spinner-icon">🎨</div>
        </div>

        <h1>Creating Your 360° Tour</h1>
        <p class="scene-name">{{ scene_name }}</p>
        <p id="status-text">Stitching {{ frame_count }} photos into a seamless panorama. This may take 1-3 minutes...</p>

        <div class="steps">
            <div class="step active" id="step-stitch">
                <span class="step-icon"></span>
                <span>Stitching panorama ({{ frame_count }} frames)</span>
            </div>
            <div class="step pending" id="step-optimize">
                <span class="step-icon"></span>
                <span>Optimizing image quality</span>
            </div>
            <div class="step pending" id="step-upload">
                <span class="step-icon"></span>
                <span>Uploading to CDN</span>
            </div>
            <div class="step pending" id="step-save">
                <span class="step-icon"></span>
                <span>Saving to restaurant profile</span>
            </div>
        </div>

        <div class="error-box" id="error-box">
            <p id="error-text"></p>
        </div>

        <a href="{{ callback_url }}" class="btn-primary" id="done-btn" style="display:none">
            ← Back to Dashboard
        </a>
    </div>

    <script>
        const SESSION_ID = "{{ session_id }}";
        const CALLBACK_URL = "{{ callback_url }}";
        const STEPS = ["stitch", "optimize", "upload", "save"];
        let currentStep = 0;
        let pollCount = 0;

        function setStep(index) {
            STEPS.forEach((s, i) => {
                const el = document.getElementById(`step-${s}`);
                el.className = "step " + (i < index ? "done" : i === index ? "active" : "pending");
            });
        }

        async function pollStatus() {
            try {
                const resp = await fetch(`/vr-tour/api/status/${SESSION_ID}`);
                const data = await resp.json();

                if (data.status === "stitching") {
                    setStep(0);
                    document.getElementById("status-text").textContent = 
                        "Stitching photos into a seamless panorama. This may take 1-3 minutes...";
                } else if (data.status === "uploading") {
                    setStep(2);
                    document.getElementById("status-text").textContent = 
                        "Panorama created! Uploading to CDN...";
                } else if (data.status === "done") {
                    setStep(4);
                    document.getElementById("spinner").style.display = "none";
                    document.getElementById("status-text").innerHTML = 
                        '🎉 <strong>Tour created successfully!</strong>';

                    if (CALLBACK_URL) {
                        document.getElementById("done-btn").style.display = "inline-block";
                        // Auto-redirect after 2 seconds
                        setTimeout(() => { window.location.href = CALLBACK_URL; }, 2000);
                    }
                    return; // Stop polling
                } else if (data.status === "failed") {
                    document.getElementById("spinner").style.display = "none";
                    document.getElementById("status-text").textContent = "Processing failed.";
                    document.getElementById("error-box").style.display = "block";
                    document.getElementById("error-text").textContent = 
                        data.error || "An unexpected error occurred during stitching.";
                    if (CALLBACK_URL) {
                        document.getElementById("done-btn").style.display = "inline-block";
                    }
                    return; // Stop polling
                }

                pollCount++;
                // Poll every 3 seconds, give up after 5 minutes
                if (pollCount < 100) {
                    setTimeout(pollStatus, 3000);
                }
            } catch (err) {
                console.error("Poll error:", err);
                setTimeout(pollStatus, 5000);
            }
        }

        // Start polling
        pollStatus();
    </script>
</body>
</html>
